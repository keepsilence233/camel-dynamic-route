# ============================================================
# Application
# ============================================================
spring.application.name=camel-dynamic-route

# Spring Boot 管理端（REST API + 前端页面）端口
# Camel Netty-HTTP 路由网关端口见 route.ingress.port（8090），两者不能共用同一端口
server.port=8080

# ============================================================
# MySQL DataSource
# ============================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/camel_dynamic_route?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=xqt_user
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# SQL Initialization
# schema.sql 建表（IF NOT EXISTS 保证幂等），data.sql 写入种子数据（INSERT IGNORE 保证幂等）
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ============================================================
# MyBatis Plus
# ============================================================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.banner=false

# ============================================================
# Camel
# ============================================================
camel.springboot.main-run-controller=true

# ============================================================
# Route Gateway
# 注意：ingress.port=8090，与 Spring Boot server.port=8080 分开，避免端口冲突
# ============================================================
route.ingress.protocol=netty-http
route.ingress.host=0.0.0.0
route.ingress.port=8090
route.ingress.path=/dynamic-router
route.cache.refresh-ms=30000
